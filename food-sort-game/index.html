    <!-- Mute / Unmute Toggle Button -->
    <button id="mute-toggle" aria-label="Mute sound" style="
      position: fixed;
      bottom: 18px;
      right: 18px;
      z-index: 10000;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;

      transition: background 0.2s;
    ">🔊</button>

    <script>
      // ---- Mute / Unmute system ----
      (function() {
        let isMuted = false;
        const btn = document.getElementById('mute-toggle');
        let gainNode = null;

        // Intercept AudioContext so we can attach a master gain node
        const OriginalAudioContext = window.AudioContext || window.webkitAudioContext;
        if (OriginalAudioContext) {
          const ContextProxy = function(...args) {
            const ctx = new OriginalAudioContext(...args);
            gainNode = ctx.createGain();
            gainNode.connect(ctx.destination);
            // Patch ctx.destination to route through gainNode
            Object.defineProperty(ctx, '_muteGain', { value: gainNode });
            return ctx;
          };
          ContextProxy.prototype = OriginalAudioContext.prototype;
          window.AudioContext = ContextProxy;
          if (window.webkitAudioContext) window.webkitAudioContext = ContextProxy;
        }

        function applyMute(muted) {
          // Mute all current and future <audio> / <video> elements
          document.querySelectorAll('audio, video').forEach(el => { el.muted = muted; });
          // Mute Web Audio via gain node if available
          if (gainNode) gainNode.gain.value = muted ? 0 : 1;
          btn.textContent = muted ? '🔇' : '🔊';
          btn.setAttribute('aria-label', muted ? 'Unmute sound' : 'Mute sound');
        }

        // Keep newly created audio/video elements in sync
        const observer = new MutationObserver(() => {
          if (isMuted) {
            document.querySelectorAll('audio, video').forEach(el => { el.muted = true; });
          }
        });
        observer.observe(document.body, { childList: true, subtree: true });

        btn.addEventListener('click', () => {
          isMuted = !isMuted;
          applyMute(isMuted);
        });
      })();
    </script>

      // Placeholder bridges to link to your game's background functions

      window.executeAddPlateLogic = function() {
        console.log("Extra plate container pushed onto game screen.");
      };

      // 3. Global level tracking — interstitial every 3 levels
      let completedLevelCount = 0;

      document.addEventListener("click", function(event) {
        const target = event.target;
        const clickedText = target.innerText ? target.innerText.toLowerCase() : "";
        const parent1Text = target.parentElement ? (target.parentElement.innerText || "").toLowerCase() : "";
        const parent2Text = target.parentElement && target.parentElement.parentElement ? (target.parentElement.parentElement.innerText || "").toLowerCase() : "";

        const isPlateZone = clickedText.includes("plate") ||
                            parent1Text.includes("plate") ||
                            parent2Text.includes("plate");

        if (isPlateZone) {
          console.log("Plate button detected! Triggering rewarded ad flow...");
          window.handleAddPlateClick();
        } else if (clickedText.includes("next") || clickedText.includes("claim")) {
          completedLevelCount++;
          console.log("Levels completed this session: " + completedLevelCount);

          if (completedLevelCount > 0 && completedLevelCount % 3 === 0) {
            if (typeof h5AdPlacementManager !== "undefined" && h5AdPlacementManager) {
              h5AdPlacementManager.requestAdPlacement({
                adUnitId: "ca-app-pub-3940256099942544/1033173712",
                onAdOpened: () => {
                  console.log("Level Interstitial ad opened.");
                },
                onAdClosed: () => {
                  console.log("Level Interstitial closed. Resuming game.");
                },
                onError: (error) => {
                  console.error("Interstitial failed to load:", error);
                }
              });
            } else {
              console.log("Sandbox Fallback: Interstitial ad triggered (Every 3 levels)!");
            }
          }
        }
      });
