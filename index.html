<div style="position: fixed; top: 15px; right: 15px; font-family: Arial, sans-serif; font-size: 24px; font-weight: bold; color: #ffd700; background: rgba(0,0,0,0.85); padding: 8px 18px; border-radius: 25px; z-index: 999999; border: 3px solid #ffd700; box-shadow: 0 0 15px rgba(255,215,0,0.6); display: flex; align-items: center; gap: 8px; pointer-events: none;">
    <span>🪙</span> <span id="coin-count">0</span>
</div>

<script>
    // 1. Initialize Wallet and load saved coins from browser cache
    let coins = parseInt(localStorage.getItem("playerCoins")) || 0;
    
    function updateUI() {
        const display = document.getElementById("coin-count");
        if(display) display.innerText = coins;
    }
    updateUI(); // Run instantly when game opens

    // 2. Function to give players coins
    function addCoins(amount) {
        coins += amount;
        localStorage.setItem("playerCoins", coins); // Saves to device memory
        updateUI();
        console.log("Coins Earned! Current wallet: " + coins);
    }
    
    // Expose functions to the global game window
    window.addCoins = addCoins;
    window.playerCoins = coins;

    // 3. Automatically give 5 coins when clicking "Next" or "Claim" buttons
    document.addEventListener("click", function(event) {
        const elementText = event.target.innerText ? event.target.innerText.toLowerCase() : "";
        const elementClass = event.target.className ? event.target.className.toLowerCase() : "";
        
        if (elementText.includes("next") || elementText.includes("claim") || elementClass.includes("success") || elementClass.includes("victory")) {
            addCoins(5); // Gives 5 coins for completing a level!
        }
    });
</script>
