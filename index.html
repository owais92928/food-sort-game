      let h5AdPlacementManager;

      window.adsbygoogle.push({
        google_ad_client: "ca-pub-3940256099942544",
        enable_h5_ads: true,
        "data_admob_interstitial-slot": "ca-app-pub-3940256099942544/1033173712",
        "data_admob_rewarded-slot": "ca-app-pub-3940256099942544/5224354917",
        h5_ad_config: {
          onAdPlacementReady: (placement) => {
            h5AdPlacementManager = placement;
          }
        }
      });

  <body>
    <div id="root"></div>

    <!-- Fixed Position Banner Ad Overlay -->
    <div id="admob-header-banner" style="position: fixed; top: 10px; left: 50%; transform: translateX(-50%); z-index: 9999; width: 320px; height: 50px; text-align: center;">
      <ins class="adsbygoogle"
           style="display:inline-block;width:320px;height:50px"
           data-ad-client="ca-pub-3940256099942544"
           data-ad-slot="6300978111"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <script src="https://replit-cdn.com/replit-pill/replit-pill.global.js" data-referral-code="rlsvamk8i1mg" data-repl-id="7eb28cec-068c-420e-bcb7-a853ef16c1ca"></script>

    <script>
      // 1. Rewarded ad trigger for hints
      window.triggerInterstitialForHint = function() {
        if (typeof h5AdPlacementManager !== "undefined" && h5AdPlacementManager) {
          h5AdPlacementManager.requestAdPlacement({
            adUnitId: "ca-app-pub-3940256099942544/5354046379",
            onAdOpened: () => {
              console.log("Rewarded Interstitial opened.");
            },
            onAdClosed: () => {
              console.log("Rewarded Interstitial closed.");
            },
            onUserEarnedRewardListener: (reward) => {
              console.log("Reward earned:", reward);
              if (typeof window.showTheActualHint === "function") {
                window.showTheActualHint();
              }
            }
          });
        } else {
          // Fallback for local testing without internet/API
          if (typeof window.showTheActualHint === "function") {
            window.showTheActualHint();
          }
        }
      };

      // 2. Add Plate click system — rewarded ad for extra plate
      window.handleAddPlateClick = function() {
        alert("To add an extra plate, you must watch a short video.");

        if (h5AdPlacementManager) {
          h5AdPlacementManager.show({
            adUnitId: "ca-app-pub-3940256099942544/5224354917",
            onUserEarnedReward: (reward) => {
              if (typeof window.executeAddPlateLogic === "function") {
                window.executeAddPlateLogic();
              }
              alert("Success! Extra plate added.");
            },
            onError: (error) => {
              alert("Video failed to load. Please try again.");
            }
          });
        } else {
          alert("Ad engine is loading. Tap button again.");
        }
      };

      // Placeholder bridges to link to your game's background functions
      window.showTheActualHint = function() {
        console.log("Visual hint executed on layout.");
      };

      window.executeAddPlateLogic = function() {
        console.log("Extra plate container pushed onto game screen.");
      };

      // 3. Global level tracking — interstitial every 3 levels
      let completedLevelCount = 0;

      document.addEventListener("click", function(event) {
        const target = event.target;
        const clickedText = target.innerText ? target.innerText.toLowerCase() : "";
        const parent1Text = target.parentElement ? (target.parentElement.innerText || "").toLowerCase() : "";
        const parent2Text = target.parentElement && target.parentElement.parentElement ? (target.parentElement.parentElement.innerText || "").toLowerCase() : "";

        const isPlateZone = clickedText.includes("plate") ||
                            parent1Text.includes("plate") ||
                            parent2Text.includes("plate");

        if (isPlateZone) {
          console.log("Plate button detected! Triggering rewarded ad flow...");
          window.handleAddPlateClick();
        } else if (clickedText.includes("next") || clickedText.includes("claim")) {
          completedLevelCount++;
          console.log("Levels completed this session: " + completedLevelCount);

          if (completedLevelCount > 0 && completedLevelCount % 3 === 0) {
            if (typeof h5AdPlacementManager !== "undefined" && h5AdPlacementManager) {
              h5AdPlacementManager.show({
                adUnitId: "ca-app-pub-3940256099942544/1033173712",
                onAdOpened: () => {
                  console.log("Level Interstitial ad opened.");
                },
                onAdClosed: () => {
                  console.log("Level Interstitial closed. Resuming game.");
                },
                onError: (error) => {
                  console.error("Interstitial failed to load:", error);
                }
              });
            } else {
              console.log("Sandbox Fallback: Interstitial ad triggered (Every 3 levels)!");
            }
          }
        }
      });
    </script>
